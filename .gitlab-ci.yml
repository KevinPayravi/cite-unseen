# Builds a bundled version of Cite Unseen and pushes to the deploy branch.
stages:
  - check
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

variables:
  GIT_STRATEGY: fetch
  GIT_DEPTH: "50"

check-build-script:
  stage: check
  image: alpine/git:2.43.0
  script:
    - git fetch origin main
    - |
      if ! git diff --quiet origin/main -- build.js; then
        echo "ERROR: build.js has been modified in this MR. Changes to the build script are not permitted for security reasons."
        exit 1
      fi
      echo "build.js is unchanged. Proceeding."
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

build:
  stage: build
  image: node:22-alpine
  script:
    - echo "Building bundled version of Cite Unseen..."
    - apk add --no-cache git
    - node build.js
  artifacts:
    paths:
      - build/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.deploy-base:
  stage: deploy
  image: alpine/git:2.43.0
  needs:
    - job: build
      artifacts: true
  before_script:
    - set -euo pipefail
    - git config --global user.name "kevinpayravi"
    - git config --global user.email "kevinpayravi@gmail.com"
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - git remote set-url origin "https://gitlab-ci-token:${DEPLOY_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git fetch origin --prune
  script:
    - echo "Deploying to $DEPLOY_TARGET_BRANCH branch..."
    - |
      if git ls-remote --exit-code --heads origin "$DEPLOY_TARGET_BRANCH" >/dev/null 2>&1; then
        git checkout -B "$DEPLOY_TARGET_BRANCH" "origin/$DEPLOY_TARGET_BRANCH"
      else
        git checkout --orphan "$DEPLOY_TARGET_BRANCH"
        git rm -rf . || true
      fi
    - cp build/cite-unseen-bundled.js .
    - cp build/README.md .
    - git add cite-unseen-bundled.js README.md
    - |
      if git diff --cached --quiet; then
        echo "No changes to deploy."
      else
        git commit -m "Deploy bundled version from ${CI_COMMIT_SHA}"
        git push origin "$DEPLOY_TARGET_BRANCH"
      fi

deploy:
  extends: .deploy-base
  variables:
    DEPLOY_TARGET_BRANCH: "deploy"
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success

deploy-dev:
  extends: .deploy-base
  variables:
    DEPLOY_TARGET_BRANCH: "deploy-dev"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success

deploy-mr:
  extends: .deploy-base
  needs:
    - job: build
      artifacts: true
    - job: check-build-script
  variables:
    DEPLOY_TARGET_BRANCH: "deploy-mr-$CI_MERGE_REQUEST_IID"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
